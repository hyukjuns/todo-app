<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- 로그인 화면: 비로그인 상태에서만 표시 -->
  <div id="auth-section" class="auth-section">
    <h1>Todo</h1>
    <p class="auth-desc">Google 계정으로 로그인하세요</p>
    <button id="google-login-btn" class="google-btn">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" width="20">
      Google로 로그인
    </button>
    <p id="auth-message"></p>
  </div>

  <!-- 앱 화면: 로그인 후에만 표시 -->
  <div id="app-section" class="container hidden">
    <div class="app-header">
      <h1>Todo</h1>
      <div class="user-info">
        <img id="user-avatar" class="user-avatar" src="" alt="" width="28" height="28">
        <span id="user-email-display"></span>
        <button id="logout-btn">로그아웃</button>
      </div>
    </div>

    <!-- 할일 입력 영역 -->
    <div class="input-row">
      <input type="text" id="todo-input" placeholder="할일을 입력하세요" autocomplete="off">
      <select id="priority-select">
        <option value="high">높음</option>
        <option value="medium" selected>중간</option>
        <option value="low">낮음</option>
      </select>
      <button id="add-btn">추가</button>
      <button id="delete-checked-btn" disabled>삭제</button>
    </div>

    <!-- 할일 목록 -->
    <ul id="todo-list"></ul>
  </div>

  <script src="app.js"></script>
</body>
</html>
